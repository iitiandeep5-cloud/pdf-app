{% extends 'base.html' %}
{% block content %}
<div style="max-width:380px; margin:60px auto; background:white;
            padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  <h2 style="margin-bottom:20px;">🔐 Admin Login</h2>
  <form method="POST">
    <input type="text" name="username" placeholder="Username" required
           style="width:100%; padding:10px; margin-bottom:12px; border:1px solid #ccc; border-radius:5px;"><br>
    <input type="password" name="password" placeholder="Password" required
           style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px;"><br>
    <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
  </form>
</div>
{% endblock %}
