<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF Library</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
    nav { background: #2c3e50; color: white; padding: 14px 30px;
          display: flex; justify-content: space-between; align-items: center; }
    nav a { color: white; text-decoration: none; margin-left: 15px; font-size: 14px; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 850px; margin: 30px auto; padding: 0 20px; }
    .flash { background: #d4edda; border: 1px solid #c3e6cb;
             padding: 10px 15px; border-radius: 6px; margin-bottom: 20px; }
    .btn { padding: 8px 16px; border: none; border-radius: 5px;
           cursor: pointer; text-decoration: none; font-size: 14px; display: inline-block; }
    .btn-primary { background: #3498db; color: white; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
<nav>
  <span>📄 PDF Library</span>
  <div>
    <a href="/">Home</a>
    {% if current_user.is_authenticated %}
      <a href="/logout">Logout ({{ current_user.username }})</a>
    {% else %}
      <a href="/login">Admin Login</a>
    {% endif %}
  </div>
</nav>
<div class="container">
  {% for msg in get_flashed_messages() %}
    <div class="flash">{{ msg }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
